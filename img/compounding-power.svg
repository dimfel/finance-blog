<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320">
  <rect width="760" height="320" fill="#f8fafa" rx="10"/>
  <text x="380" y="32" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#1f2933">The Power of Compounding — $10,000 at ~8% per Year</text>
  <text x="380" y="50" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" text-anchor="middle" fill="#7b8794">You added nothing. Time did all the work. The enemy of compounding is the urge to tinker.</text>

  <!-- Bars -->
  <!-- Year 0: $10,000 -->
  <rect x="60" y="218" width="80" height="30" fill="#e4e9ec" rx="4"/>
  <text x="100" y="237" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#52606d" text-anchor="middle">$10K</text>
  <text x="100" y="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#7b8794" text-anchor="middle">Start</text>

  <!-- Year 5: $14,693 -->
  <rect x="180" y="182" width="80" height="66" fill="#99f6e4" rx="4"/>
  <text x="220" y="210" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56" text-anchor="middle">$14,693</text>
  <text x="220" y="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#7b8794" text-anchor="middle">Year 5</text>

  <!-- Year 10: $21,589 -->
  <rect x="300" y="140" width="80" height="108" fill="#34d399" rx="4"/>
  <text x="340" y="177" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">$21,589</text>
  <text x="340" y="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#7b8794" text-anchor="middle">Year 10</text>

  <!-- Year 20: $46,610 -->
  <rect x="420" y="80" width="80" height="168" fill="#0f766e" rx="4"/>
  <text x="460" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#ecfdf5" text-anchor="middle">$46,610</text>
  <text x="460" y="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#7b8794" text-anchor="middle">Year 20</text>

  <!-- Year 30: $100,626 -->
  <rect x="540" y="60" width="80" height="188" fill="#0b5d56" rx="4"/>
  <text x="580" y="100" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#99f6e4" text-anchor="middle">$100,626</text>
  <text x="580" y="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#7b8794" text-anchor="middle">Year 30</text>

  <!-- X label -->
  <line x1="40" y1="248" x2="680" y2="248" stroke="#e4e9ec" stroke-width="1"/>

  <!-- 10x callout -->
  <line x1="580" y1="58" x2="660" y2="72" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="648" y="60" width="100" height="40" fill="#0f766e" rx="6"/>
  <text x="698" y="77" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">10× in 30 yrs</text>
  <text x="698" y="92" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#99f6e4" text-anchor="middle">no extra deposits</text>

  <!-- Note -->
  <rect x="20" y="274" width="720" height="36" fill="#ecfdf5" rx="7"/>
  <text x="380" y="290" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#0b5d56" text-anchor="middle" font-weight="600">No year is average. Past averages are not promises. This illustration is for the concept only — not a forecast or guarantee of returns.</text>
  <text x="380" y="303" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#7b8794" text-anchor="middle">Note: The ~8% p.a. figure is a rough long-run average for broad equity markets before inflation and fees. Your actual returns will vary.</text>
</svg>
