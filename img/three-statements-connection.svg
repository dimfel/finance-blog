<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 310" width="760" height="310">
  <rect width="760" height="310" fill="#f8fafa" rx="10"/>
  <text x="380" y="32" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#1f2933">How the Three Statements Connect</text>
  <text x="380" y="50" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" text-anchor="middle" fill="#7b8794">They are three views of the same business — not three separate reports.</text>

  <!-- Income Statement Box -->
  <rect x="30" y="72" width="200" height="160" fill="#ecfdf5" rx="8" stroke="#99f6e4" stroke-width="1.5"/>
  <rect x="30" y="72" width="200" height="36" fill="#0f766e" rx="8 8 0 0"/>
  <text x="130" y="95" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Income Statement</text>
  <text x="50" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Revenue</text>
  <text x="50" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">− COGS, Operating Exp.</text>
  <text x="50" y="154" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">− Interest &amp; Taxes</text>
  <line x1="50" y1="160" x2="210" y2="160" stroke="#99f6e4" stroke-width="1"/>
  <text x="50" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56">= Net Income</text>
  <text x="50" y="198" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#0b5d56">÷ shares = EPS</text>
  <text x="50" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">(Period: Q or Year)</text>

  <!-- Balance Sheet Box -->
  <rect x="280" y="72" width="200" height="160" fill="#ecfdf5" rx="8" stroke="#99f6e4" stroke-width="1.5"/>
  <rect x="280" y="72" width="200" height="36" fill="#0f766e" rx="8 8 0 0"/>
  <text x="380" y="95" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Balance Sheet</text>
  <text x="300" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Assets (Cash, PPE…)</text>
  <text x="300" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">= Liabilities + Equity</text>
  <line x1="300" y1="148" x2="460" y2="148" stroke="#99f6e4" stroke-width="1"/>
  <text x="300" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Retained Earnings ← Net Income</text>
  <text x="300" y="186" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Cash balance ← Cash Flow</text>
  <text x="300" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">(Snapshot: one date)</text>

  <!-- Cash Flow Box -->
  <rect x="530" y="72" width="200" height="160" fill="#ecfdf5" rx="8" stroke="#99f6e4" stroke-width="1.5"/>
  <rect x="530" y="72" width="200" height="36" fill="#0f766e" rx="8 8 0 0"/>
  <text x="630" y="95" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Cash Flow Statement</text>
  <text x="550" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Starts with Net Income</text>
  <text x="550" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">± Non-cash adjustments</text>
  <text x="550" y="154" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">= Operating Cash Flow</text>
  <line x1="550" y1="162" x2="720" y2="162" stroke="#99f6e4" stroke-width="1"/>
  <text x="550" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56">− Capex = Free Cash Flow</text>
  <text x="550" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">(Period: Q or Year)</text>

  <!-- Arrow: Income → Balance Sheet (Net Income → Retained Earnings) -->
  <line x1="230" y1="165" x2="278" y2="155" stroke="#0f766e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f766e"/>
    </marker>
  </defs>
  <text x="254" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#0b5d56" text-anchor="middle">Net income →</text>
  <text x="254" y="159" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#0b5d56" text-anchor="middle">retained earnings</text>

  <!-- Arrow: Cash Flow → Balance Sheet (Cash) -->
  <line x1="528" y1="155" x2="482" y2="165" stroke="#0f766e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#0b5d56" text-anchor="middle">← cash balance</text>

  <!-- Arrow: Income → Cash Flow (starts with net income) -->
  <path d="M 130 72 C 130 50 630 50 630 72" fill="none" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="380" y="46" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#0b5d56" text-anchor="middle">Cash flow starts with net income from the income statement</text>

  <!-- Bottom note -->
  <rect x="30" y="246" width="700" height="48" fill="#ecfdf5" rx="7"/>
  <text x="50" y="265" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56">Reading the links:</text>
  <text x="50" y="283" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Net income flows from the income statement → into retained earnings on the balance sheet and the top of the cash flow statement.</text>
  <text x="50" y="298" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">The closing cash balance on the cash flow statement must match the cash line on the balance sheet.</text>
</svg>
