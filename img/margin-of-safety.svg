<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" width="760" height="290">
  <rect width="760" height="290" fill="#f8fafa" rx="10"/>
  <text x="380" y="32" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#1f2933">Margin of Safety — Buy Below Your Estimate of Value</text>
  <text x="380" y="50" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" text-anchor="middle" fill="#7b8794">Because your valuation estimate can be wrong, demand a discount. The gap protects you.</text>

  <!-- Price scale -->
  <line x1="60" y1="140" x2="700" y2="140" stroke="#e4e9ec" stroke-width="2"/>

  <!-- Buy zone (green fill) -->
  <rect x="60" y="114" width="280" height="52" fill="#ecfdf5" rx="6"/>
  <text x="200" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#0b5d56" text-anchor="middle" font-weight="600">✓ Potential buy zone</text>

  <!-- Danger zone (red fill) -->
  <rect x="400" y="114" width="300" height="52" fill="#fff1f1" rx="6"/>
  <text x="550" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#991b1b" text-anchor="middle" font-weight="600">✗ Paying up / overvalued</text>

  <!-- Price markers -->
  <!-- $9 - current buy target -->
  <line x1="130" y1="114" x2="130" y2="174" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="90" y="178" width="80" height="34" fill="#16a34a" rx="5"/>
  <text x="130" y="194" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">$9</text>
  <text x="130" y="208" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Buy target</text>

  <!-- $10 - max buy price -->
  <line x1="280" y1="114" x2="280" y2="174" stroke="#0f766e" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="240" y="178" width="80" height="34" fill="#0f766e" rx="5"/>
  <text x="280" y="194" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">$10</text>
  <text x="280" y="208" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Max price</text>

  <!-- $14 - intrinsic value -->
  <line x1="460" y1="100" x2="460" y2="174" stroke="#1f2933" stroke-width="2.5"/>
  <rect x="400" y="178" width="120" height="34" fill="#1f2933" rx="5"/>
  <text x="460" y="194" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">$14</text>
  <text x="460" y="208" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#e4e9ec" text-anchor="middle">Intrinsic value est.</text>

  <!-- $18 - overvalued -->
  <line x1="620" y1="114" x2="620" y2="174" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="575" y="178" width="90" height="34" fill="#dc2626" rx="5"/>
  <text x="620" y="194" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">$18</text>
  <text x="620" y="208" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Overpaying</text>

  <!-- Margin of safety brace -->
  <line x1="130" y1="92" x2="460" y2="92" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="130" y1="88" x2="130" y2="96" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="460" y1="88" x2="460" y2="96" stroke="#0f766e" stroke-width="1.5"/>
  <text x="295" y="83" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0f766e" text-anchor="middle">Margin of Safety = ~36% discount</text>

  <!-- Bottom explanation -->
  <rect x="20" y="228" width="720" height="50" fill="#ecfdf5" rx="7"/>
  <text x="40" y="248" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56">The engineer's rule:</text>
  <text x="40" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">A bridge rated for 10 tons is built to hold 30. The extra capacity is there because real-world estimates are imperfect.</text>
  <text x="40" y="274" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">If intrinsic value is ~$14, waiting to buy at ~$9-$10 protects you when (not if) your estimate is off.</text>
</svg>
