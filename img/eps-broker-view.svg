<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360">
  <rect width="760" height="360" fill="#f8fafa" rx="10"/>
  <text x="380" y="32" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#1f2933">EPS — Where You See It in a Stock App</text>
  <text x="380" y="50" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" text-anchor="middle" fill="#7b8794">EPS (Earnings Per Share) appears in the stats grid and feeds directly into P/E ratio.</text>

  <!-- Mock phone screen -->
  <rect x="160" y="66" width="300" height="264" fill="#ffffff" rx="12" stroke="#e4e9ec" stroke-width="2"/>

  <!-- Stock header mock -->
  <rect x="160" y="66" width="300" height="50" fill="#1f2933" rx="12 12 0 0"/>
  <text x="310" y="87" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">AAPL  Apple Inc.</text>
  <text x="310" y="105" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#34d399" text-anchor="middle">$187.42  ▲ +1.23%</text>

  <!-- Stats grid -->
  <!-- Row 1 -->
  <rect x="160" y="116" width="150" height="44" fill="#f8fafa" stroke="#e4e9ec" stroke-width="0.5"/>
  <text x="175" y="134" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">High</text>
  <text x="175" y="151" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2933">$189.30</text>
  <rect x="310" y="116" width="150" height="44" fill="#f8fafa" stroke="#e4e9ec" stroke-width="0.5"/>
  <text x="325" y="134" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">Low</text>
  <text x="325" y="151" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2933">$185.80</text>

  <!-- Row 2 -->
  <rect x="160" y="160" width="150" height="44" fill="#ffffff" stroke="#e4e9ec" stroke-width="0.5"/>
  <text x="175" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">Volume</text>
  <text x="175" y="195" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2933">52.4M</text>
  <rect x="310" y="160" width="150" height="44" fill="#ffffff" stroke="#e4e9ec" stroke-width="0.5"/>
  <text x="325" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">Market Cap</text>
  <text x="325" y="195" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2933">$2.91T</text>

  <!-- Row 3 — EPS highlighted -->
  <rect x="160" y="204" width="150" height="50" fill="#ecfdf5" rx="0" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="175" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#0b5d56">EPS (TTM) ◀</text>
  <text x="175" y="244" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#0f766e">$6.43</text>
  <!-- P/E highlighted -->
  <rect x="310" y="204" width="150" height="50" fill="#ecfdf5" rx="0" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="325" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#0b5d56">P/E TTM ◀</text>
  <text x="325" y="244" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#0f766e">29.1×</text>

  <!-- Row 4 -->
  <rect x="160" y="254" width="150" height="44" fill="#f8fafa" stroke="#e4e9ec" stroke-width="0.5"/>
  <text x="175" y="272" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">Div / Share</text>
  <text x="175" y="289" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#1f2933">$0.96</text>
  <rect x="310" y="254" width="150" height="44" fill="#f8fafa" stroke="#e4e9ec" stroke-width="0.5"/>
  <text x="325" y="272" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7b8794">52-wk Range</text>
  <text x="325" y="289" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#1f2933">$143–$199</text>

  <!-- Callout lines from EPS and P/E -->
  <line x1="460" y1="229" x2="516" y2="160" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="310" y1="229" x2="242" y2="175" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- EPS explanation panel -->
  <rect x="490" y="66" width="240" height="130" fill="#ecfdf5" rx="8" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="610" y="88" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56" text-anchor="middle">EPS Formula</text>
  <text x="510" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Net Income</text>
  <line x1="510" y1="114" x2="720" y2="114" stroke="#99f6e4" stroke-width="1"/>
  <text x="510" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Diluted Shares Outstanding</text>
  <text x="610" y="154" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="middle">= Profit per share you own</text>
  <text x="610" y="172" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#7b8794" text-anchor="middle">e.g. $96B ÷ 15B shares = $6.40</text>

  <!-- P/E explanation panel -->
  <rect x="490" y="210" width="240" height="110" fill="#ecfdf5" rx="8" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="610" y="230" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56" text-anchor="middle">P/E (TTM) Formula</text>
  <text x="510" y="252" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">Share Price  ($187.42)</text>
  <line x1="510" y1="258" x2="720" y2="258" stroke="#99f6e4" stroke-width="1"/>
  <text x="510" y="274" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#52606d">EPS TTM  ($6.43)</text>
  <text x="610" y="298" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#0f766e" text-anchor="middle" font-weight="700">= 29.1× — you pay $29 per $1 profit</text>
</svg>
