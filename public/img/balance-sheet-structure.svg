<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#f8fafa" rx="10"/>
  <text x="380" y="34" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#1f2933">Balance Sheet — Assets = Liabilities + Equity</text>
  <text x="380" y="54" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" text-anchor="middle" fill="#7b8794">A snapshot at one moment in time. The two sides must always balance.</text>

  <!-- Left: ASSETS -->
  <rect x="20" y="66" width="340" height="38" fill="#0f766e" rx="7 7 0 0"/>
  <text x="190" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">ASSETS</text>

  <!-- Current Assets -->
  <rect x="20" y="104" width="340" height="28" fill="#ecfdf5"/>
  <text x="38" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56">Current Assets  (&lt; 1 year)</text>
  <rect x="20" y="132" width="340" height="22" fill="#ffffff"/>
  <text x="50" y="147" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Cash &amp; equivalents</text>
  <text x="352" y="147" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$1,200</text>
  <rect x="20" y="154" width="340" height="22" fill="#f8fafa"/>
  <text x="50" y="169" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Accounts receivable</text>
  <text x="352" y="169" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$800</text>
  <rect x="20" y="176" width="340" height="22" fill="#ffffff"/>
  <text x="50" y="191" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Inventory</text>
  <text x="352" y="191" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$600</text>

  <!-- Non-current Assets -->
  <rect x="20" y="210" width="340" height="28" fill="#ecfdf5"/>
  <text x="38" y="228" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56">Non-current Assets  (&gt; 1 year)</text>
  <rect x="20" y="238" width="340" height="22" fill="#ffffff"/>
  <text x="50" y="253" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Property, plant &amp; equipment</text>
  <text x="352" y="253" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$3,500</text>
  <rect x="20" y="260" width="340" height="22" fill="#f8fafa"/>
  <text x="50" y="275" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Intangible assets &amp; goodwill</text>
  <text x="352" y="275" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$900</text>

  <!-- Total Assets -->
  <rect x="20" y="296" width="340" height="38" fill="#0f766e" rx="0 0 7 7"/>
  <text x="38" y="319" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff">Total Assets</text>
  <text x="352" y="319" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="end">$7,000</text>

  <!-- Right: LIABILITIES + EQUITY -->
  <rect x="400" y="66" width="340" height="38" fill="#0f766e" rx="7 7 0 0"/>
  <text x="570" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">LIABILITIES + EQUITY</text>

  <!-- Current Liabilities -->
  <rect x="400" y="104" width="340" height="28" fill="#fff7f7"/>
  <text x="418" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#991b1b">Current Liabilities  (&lt; 1 year)</text>
  <rect x="400" y="132" width="340" height="22" fill="#ffffff"/>
  <text x="430" y="147" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Accounts payable</text>
  <text x="732" y="147" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$500</text>
  <rect x="400" y="154" width="340" height="22" fill="#f8fafa"/>
  <text x="430" y="169" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Short-term debt</text>
  <text x="732" y="169" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$400</text>

  <!-- Long-term Liabilities -->
  <rect x="400" y="188" width="340" height="28" fill="#fff7f7"/>
  <text x="418" y="206" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#991b1b">Long-term Liabilities  (&gt; 1 year)</text>
  <rect x="400" y="216" width="340" height="22" fill="#ffffff"/>
  <text x="430" y="231" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Long-term debt / bonds</text>
  <text x="732" y="231" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$2,100</text>

  <!-- Shareholders Equity -->
  <rect x="400" y="250" width="340" height="28" fill="#ecfdf5"/>
  <text x="418" y="268" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56">Shareholders' Equity (Book Value)</text>
  <rect x="400" y="278" width="340" height="22" fill="#ffffff"/>
  <text x="430" y="293" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Common stock &amp; paid-in capital</text>
  <text x="732" y="293" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$1,500</text>
  <rect x="400" y="300" width="340" height="22" fill="#f8fafa"/>
  <text x="430" y="315" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Retained earnings</text>
  <text x="732" y="315" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#1f2933" text-anchor="end">$2,500</text>

  <!-- Total Liabilities + Equity -->
  <rect x="400" y="336" width="340" height="38" fill="#0f766e" rx="0 0 7 7"/>
  <text x="418" y="359" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ffffff">Total Liabilities + Equity</text>
  <text x="732" y="359" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="end">$7,000</text>

  <!-- Equals sign / connector -->
  <line x1="360" y1="315" x2="400" y2="315" stroke="#99f6e4" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="380" y="320" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#0f766e" text-anchor="middle">=</text>

  <!-- Legend at bottom -->
  <rect x="20" y="390" width="720" height="74" fill="#ecfdf5" rx="7"/>
  <text x="40" y="412" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0b5d56">Key insight:</text>
  <text x="40" y="430" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Everything the company owns (assets) was funded by either borrowed money (liabilities) or owners' money (equity).</text>
  <text x="40" y="448" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#52606d">Current assets vs. current liabilities = working capital — a quick check on whether it can pay near-term bills.</text>
  <text x="40" y="454" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#7b8794"> </text>
</svg>
